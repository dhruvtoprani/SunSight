services:
  sunsight:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      MAPBOX_ACCESS_TOKEN: ${MAPBOX_ACCESS_TOKEN:-}
      MAPBOX_COUNTRY: ${MAPBOX_COUNTRY:-US}
      PVWATTS_API_KEY: ${PVWATTS_API_KEY:-}
      PVWATTS_BASE_URL: ${PVWATTS_BASE_URL:-https://developer.nlr.gov/api/pvwatts/v8.json}
    ports:
      - "8000:8000"
